<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline — Sapan Kumar Mohanty</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{--gold:#C9A84C;--dark:#0D0D0D;--text:#F0EDE8;--muted:#888;}
  body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center;}
  .bg{position:fixed;inset:0;background:radial-gradient(ellipse 60% 60% at 50% 50%,rgba(201,168,76,0.05) 0%,transparent 70%);pointer-events:none;}
  .icon{font-size:64px;margin-bottom:24px;opacity:0.4;}
  h1{font-family:'Playfair Display',serif;font-size:clamp(28px,5vw,48px);font-weight:700;margin-bottom:12px;color:var(--gold);}
  p{font-size:16px;color:var(--muted);max-width:400px;line-height:1.7;margin-bottom:32px;font-weight:300;}
  .btn{background:var(--gold);color:var(--dark);padding:13px 32px;border:none;border-radius:2px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;text-decoration:none;display:inline-block;transition:opacity 0.2s;}
  .btn:hover{opacity:0.85;}
  .contact{margin-top:24px;font-size:13px;color:var(--muted);}
  .contact a{color:var(--gold);text-decoration:none;}
  .brand{margin-bottom:40px;font-family:'Playfair Display',serif;font-size:18px;color:var(--gold);opacity:0.6;}
</style>
</head>
<body>
<div class="bg"></div>
<div class="brand">SKM</div>
<div class="icon">📡</div>
<h1>You're Offline</h1>
<p>It looks like you've lost your internet connection. Please reconnect and try again — the page was previously cached and will load as soon as you're back online.</p>
<a href="/" class="btn" onclick="window.location.reload()">Try Again</a>
<div class="contact">
  Or reach me directly at <a href="mailto:astartupcto@gmail.com">astartupcto@gmail.com</a>
</div>
<script>
  window.addEventListener('online', () => window.location.reload());
</script>
</body>
</html>
